name: apply

# One-click: preflight -> build & push image -> provision EKS -> deploy monitoring + app.
# Triggered manually so a fresh set of (rotating) sandbox credentials can be supplied
# via repo secrets before each run.
on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "EKS cluster name"
        required: false
        default: "oneclick-eks"

permissions:
  contents: read

concurrency:
  # Never let an apply and a destroy (or two applies) race on the same state.
  group: tf-state
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CLUSTER_NAME: ${{ github.event.inputs.cluster_name }}
  IMAGE_REPO: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/images
  TF_DIR: terraform
  MONITORING_NS: monitoring
  APP_NS: hello-world

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- credentials -------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Optional: only set when the sandbox issues temporary creds.
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # --- preflight: fail fast on bad creds / wrong region / missing perms --
      - name: IAM & region preflight
        run: |
          set -euo pipefail
          echo "Caller identity:"
          aws sts get-caller-identity
          echo "Region: ${AWS_REGION}"
          # Cheap permission probes that EKS provisioning depends on.
          aws ec2 describe-availability-zones --region "${AWS_REGION}" >/dev/null
          aws eks list-clusters --region "${AWS_REGION}" >/dev/null
          # Confirm the chosen instance type is actually offered in the region.
          aws ec2 describe-instance-type-offerings \
            --region "${AWS_REGION}" \
            --filters Name=instance-type,Values=m3.medium \
            --query 'InstanceTypeOfferings[].InstanceType' --output text \
            | grep -q m3.medium \
            || { echo "::error::m3.medium not offered in ${AWS_REGION}"; exit 1; }

      # --- build & push image ------------------------------------------------
      - name: Set image tag
        id: img
        run: echo "tag=hello-world-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        env:
          # Suppress the auto-generated "Docker Build" job summary.
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: app
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.img.outputs.tag }}
            ${{ env.IMAGE_REPO }}:hello-world-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- provision EKS -----------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Reuse state from a previous run if present, so re-applies are incremental.
      - name: Restore Terraform state
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: tfstate
          path: ${{ env.TF_DIR }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -input=false -auto-approve \
            -var="region=${AWS_REGION}" \
            -var="cluster_name=${CLUSTER_NAME}"

      # Always persist state, even if a later step fails, so destroy can clean up.
      - name: Upload Terraform state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfstate
          path: |
            ${{ env.TF_DIR }}/terraform.tfstate
          if-no-files-found: warn
          retention-days: 7
          overwrite: true

      # --- connect kubectl/helm ---------------------------------------------
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "${AWS_REGION}" --name "${CLUSTER_NAME}"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      # --- monitoring stack --------------------------------------------------
      - name: Install kube-prometheus-stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm upgrade --install kps prometheus-community/kube-prometheus-stack \
            --namespace "${MONITORING_NS}" --create-namespace \
            -f monitoring/values.yaml \
            --wait --timeout 15m

      # --- application -------------------------------------------------------
      - name: Create Docker Hub pull secret
        run: |
          kubectl create namespace "${APP_NS}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry dockerhub-pull \
            --namespace "${APP_NS}" \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username="${{ secrets.DOCKERHUB_USERNAME }}" \
            --docker-password="${{ secrets.DOCKERHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy hello-world
        run: |
          helm upgrade --install hello-world ./helm/hello-world \
            --namespace "${APP_NS}" \
            --set image.repository="${IMAGE_REPO}" \
            --set image.tag="${{ steps.img.outputs.tag }}" \
            --wait --timeout 5m

      # --- report endpoints --------------------------------------------------
      - name: Print access info
        run: |
          set -euo pipefail
          echo "Waiting for LoadBalancer hostname..."
          for i in $(seq 1 30); do
            host=$(kubectl get svc hello-world -n "${APP_NS}" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            [ -n "${host}" ] && break
            sleep 10
          done
          PROM_SVC="kps-kube-prometheus-stack-prometheus"
          echo "Waiting for Grafana LoadBalancer hostname..."
          for i in $(seq 1 30); do
            grafana_host=$(kubectl get svc kps-grafana -n "${MONITORING_NS}" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            [ -n "${grafana_host}" ] && break
            sleep 10
          done
          {
            echo "## Deployment complete"
            echo ""
            echo "Cluster \`${CLUSTER_NAME}\` in \`${AWS_REGION}\` · image tag \`${{ steps.img.outputs.tag }}\`"
            echo ""
            echo "### Application"
            if [ -n "${host:-}" ]; then
              echo "- App URL: http://${host}/"
              echo "- Metrics: http://${host}/metrics"
            else
              echo "- LoadBalancer still provisioning; check: \`kubectl get svc hello-world -n ${APP_NS}\`"
            fi
            echo ""
            echo "### Monitoring"
            if [ -n "${grafana_host:-}" ]; then
              echo "- Grafana (admin / admin): http://${grafana_host}/"
            else
              echo "- Grafana LoadBalancer still provisioning; check: \`kubectl get svc kps-grafana -n ${MONITORING_NS}\`"
            fi
            echo "  — \"Hello World Service\" dashboard + built-in Kubernetes dashboards"
            echo "- Prometheus (ClusterIP, no public auth — port-forward):"
            echo "  \`\`\`"
            echo "  kubectl port-forward -n ${MONITORING_NS} svc/${PROM_SVC} 9090:9090"
            echo "  \`\`\`"
            echo "  → http://localhost:9090 — Status → Targets shows the hello-world ServiceMonitor UP"
          } >> "$GITHUB_STEP_SUMMARY"
