name: destroy

# Teardown counterpart to apply.yml. Two modes:
#   destroy     - tear down the live cluster with `terraform destroy`.
#   purge-state - the sandbox already reaped the resources, so skip Terraform
#                 and just clear the stale S3 state object, letting the next
#                 apply start from a clean slate.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "destroy = tear down live resources; purge-state = discard stale state only"
        required: true
        type: choice
        default: destroy
        options:
          - destroy
          - purge-state
      # Plain input (not a secret), matching apply.yml. Used by both modes to
      # locate the S3 state bucket (oneclick-tfstate-<account>-<region>).
      region:
        description: "AWS region"
        required: true
        type: choice
        default: us-east-1
        options:
          - us-east-1
          - us-east-2
          - us-west-2
      cluster_name:
        description: "EKS cluster name"
        required: false
        default: "oneclick-eks"

permissions:
  contents: read

concurrency:
  group: tf-state
  cancel-in-progress: false

env:
  AWS_REGION: ${{ github.event.inputs.region }}
  CLUSTER_NAME: ${{ github.event.inputs.cluster_name }}
  TF_DIR: terraform
  APP_NS: hello-world
  MONITORING_NS: monitoring

jobs:
  destroy:
    if: ${{ github.event.inputs.mode == 'destroy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Resolve the same S3 backend apply uses. If the bucket is missing we
      # create it (empty), which simply means there's nothing to destroy.
      - name: Ensure Terraform state bucket
        id: tfbackend
        run: |
          set -euo pipefail
          account_id=$(aws sts get-caller-identity --query Account --output text)
          bucket="oneclick-tfstate-${account_id}-${AWS_REGION}"
          if ! aws s3api head-bucket --bucket "${bucket}" 2>/dev/null; then
            echo "Creating state bucket ${bucket}..."
            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${bucket}" --region "${AWS_REGION}"
            else
              aws s3api create-bucket --bucket "${bucket}" --region "${AWS_REGION}" \
                --create-bucket-configuration LocationConstraint="${AWS_REGION}"
            fi
            aws s3api put-bucket-versioning --bucket "${bucket}" \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block --bucket "${bucket}" \
              --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          fi
          echo "bucket=${bucket}" >> "$GITHUB_OUTPUT"
          echo "key=${CLUSTER_NAME}/terraform.tfstate" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ steps.tfbackend.outputs.bucket }}" \
            -backend-config="key=${{ steps.tfbackend.outputs.key }}" \
            -backend-config="region=${AWS_REGION}"

      # Empty state (fresh/cleared bucket) means there's nothing to tear down;
      # let the rest of the job no-op cleanly instead of failing.
      - name: Check for destroyable state
        id: guard
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          count=$(terraform state list 2>/dev/null | wc -l | tr -d ' ')
          if [ "${count:-0}" -gt 0 ]; then
            echo "State has ${count} resource(s); proceeding with destroy."
            echo "has_state=true" >> "$GITHUB_OUTPUT"
          else
            echo "No resources in state — nothing to destroy."
            echo "has_state=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Nothing to destroy
        if: steps.guard.outputs.has_state != 'true'
        run: |
          echo "No live Terraform state found; cluster is already gone or was never created." >> "$GITHUB_STEP_SUMMARY"
          echo "If the sandbox reaped resources, run this workflow with mode=purge-state to clear the stale S3 state." >> "$GITHUB_STEP_SUMMARY"

      # Resolve the VPC by its tags (set in terraform/main.tf) so later steps can
      # force-clean leftover ELBs/ENIs that would otherwise pin the subnets. Tag
      # lookup works even when state is partial from an earlier failed destroy.
      - name: Resolve VPC
        id: vpc
        if: steps.guard.outputs.has_state == 'true'
        run: |
          set -uo pipefail
          vpc=$(aws ec2 describe-vpcs --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${CLUSTER_NAME}-vpc" \
                      "Name=tag:Project,Values=k8s-oneclick-deploy" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null || true)
          [ "${vpc}" = "None" ] && vpc=""
          echo "vpc_id=${vpc}" >> "$GITHUB_OUTPUT"
          echo "Resolved VPC: ${vpc:-<none>}"

      # Remove the app/Grafana LoadBalancers first so AWS releases their ELBs and
      # the ENIs they leave in the subnets; a dangling ELB blocks VPC/subnet
      # destroy. Poll until the load balancers in the VPC actually drain rather
      # than sleeping a fixed interval (ELB teardown can outlast a flat wait).
      - name: Uninstall Helm releases (best effort)
        if: steps.guard.outputs.has_state == 'true'
        continue-on-error: true
        env:
          VPC_ID: ${{ steps.vpc.outputs.vpc_id }}
        run: |
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${CLUSTER_NAME}" || exit 0
          helm uninstall hello-world -n "${APP_NS}" --wait --timeout 5m || true
          helm uninstall kps -n "${MONITORING_NS}" --wait --timeout 5m || true
          if [ -n "${VPC_ID:-}" ]; then
            echo "Waiting for load balancers in ${VPC_ID} to drain..."
            for i in $(seq 1 20); do
              classic=$(aws elb describe-load-balancers --region "${AWS_REGION}" \
                --query "length(LoadBalancerDescriptions[?VPCId=='${VPC_ID}'])" --output text 2>/dev/null || echo 0)
              v2=$(aws elbv2 describe-load-balancers --region "${AWS_REGION}" \
                --query "length(LoadBalancers[?VpcId=='${VPC_ID}'])" --output text 2>/dev/null || echo 0)
              echo "  attempt ${i}: classic=${classic} v2=${v2}"
              [ "${classic:-0}" = "0" ] && [ "${v2:-0}" = "0" ] && break
              sleep 15
            done
          else
            echo "No VPC resolved; falling back to a fixed wait."
            sleep 60
          fi

      # terraform destroy writes the emptied state back to S3 automatically.
      # If it fails (typically a DependencyViolation: an orphaned ELB/ENI still
      # pinning a subnet), force-delete the leftover load balancers and freed
      # ENIs in the VPC, then retry destroy once.
      - name: Terraform destroy (force cleanup on failure)
        if: steps.guard.outputs.has_state == 'true'
        working-directory: ${{ env.TF_DIR }}
        env:
          VPC_ID: ${{ steps.vpc.outputs.vpc_id }}
        run: |
          set -uo pipefail
          destroy() {
            terraform destroy -input=false -auto-approve \
              -var="region=${AWS_REGION}" \
              -var="cluster_name=${CLUSTER_NAME}"
          }
          force_cleanup() {
            if [ -z "${VPC_ID:-}" ]; then
              echo "::warning::No VPC id resolved; cannot force-clean leftover ELBs/ENIs."
              return 0
            fi
            echo "::warning::Force-cleaning leftover load balancers and ENIs in ${VPC_ID}"
            for nm in $(aws elb describe-load-balancers --region "${AWS_REGION}" \
                --query "LoadBalancerDescriptions[?VPCId=='${VPC_ID}'].LoadBalancerName" --output text 2>/dev/null); do
              echo "deleting classic ELB ${nm}"
              aws elb delete-load-balancer --region "${AWS_REGION}" --load-balancer-name "${nm}" || true
            done
            for arn in $(aws elbv2 describe-load-balancers --region "${AWS_REGION}" \
                --query "LoadBalancers[?VpcId=='${VPC_ID}'].LoadBalancerArn" --output text 2>/dev/null); do
              echo "deleting v2 LB ${arn}"
              aws elbv2 delete-load-balancer --region "${AWS_REGION}" --load-balancer-arn "${arn}" || true
            done
            echo "waiting for ENIs to detach..."
            sleep 45
            for eni in $(aws ec2 describe-network-interfaces --region "${AWS_REGION}" \
                --filters Name=vpc-id,Values="${VPC_ID}" Name=status,Values=available \
                --query 'NetworkInterfaces[].NetworkInterfaceId' --output text 2>/dev/null); do
              echo "deleting ENI ${eni}"
              aws ec2 delete-network-interface --region "${AWS_REGION}" --network-interface-id "${eni}" || true
            done
          }
          if ! destroy; then
            echo "First destroy failed; force-cleaning leftovers and retrying once."
            force_cleanup
            destroy
          fi

  purge-state:
    if: ${{ github.event.inputs.mode == 'purge-state' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # No Terraform run: the resources are already gone. Just clear the S3
      # state object (and any stale lockfile) so the next apply starts clean.
      # The bucket is versioned, so this leaves a delete marker — recoverable
      # if needed — rather than hard-deleting history.
      - name: Purge S3 state
        run: |
          set -euo pipefail
          account_id=$(aws sts get-caller-identity --query Account --output text)
          bucket="oneclick-tfstate-${account_id}-${AWS_REGION}"
          key="${CLUSTER_NAME}/terraform.tfstate"
          if ! aws s3api head-bucket --bucket "${bucket}" 2>/dev/null; then
            echo "No state bucket ${bucket}; nothing to purge." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          aws s3 rm "s3://${bucket}/${key}" || true
          aws s3 rm "s3://${bucket}/${key}.tflock" || true
          echo "Purged state at \`s3://${bucket}/${key}\`. Next apply starts clean." >> "$GITHUB_STEP_SUMMARY"
